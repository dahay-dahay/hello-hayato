<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hello Hayato</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-card">
      <p class="eyebrow">First Web App</p>
      <h1>Hello Hayato 🚀</h1>
      <p class="description">ボタンを押すと数字が 1 ずつ増えます。</p>

      <section class="counter" aria-label="カウンター">
        <p class="counter-label">現在の数字</p>
        <p id="count" class="counter-number">0</p>
        <button id="incrementButton" type="button">+1</button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
